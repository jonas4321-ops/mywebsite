<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>月曆切換式人力預約系統 (管理維護進階版)</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #16a085;
            --bg: #f4f6f9;
            --booked-bg: #e8f8f5;
            --booked-border: #27ae60;
            --locked-text: #2c3e50;
            --disabled-bg: #eceff1;
            --disabled-text: #90a4ae;
            --danger: #e74c3c;
        }
        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1300px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #eee;
            padding-bottom: 15px;
            margin-bottom: 25px;
        }
        h2 { margin: 0; color: var(--primary); }
        
        .auth-panel {
            background: #f8f9fa;
            padding: 10px 15px;
            border-radius: 6px;
            border: 1px solid #e2e8f0;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .auth-panel input {
            padding: 6px 10px;
            border: 1px solid #cbd5e1;
            border-radius: 4px;
            font-size: 13px;
        }

        #admin-actions {
            display: none; 
            gap: 10px;
        }

        .btn {
            padding: 10px 18px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
        }
        .btn-import { background: #34495e; color: white; }
        .btn-export { background: var(--accent); color: white; }
        .btn-cancel { background: #e2e8f0; color: #475569; }
        .btn-cancel:hover { background: #cbd5e1; }
        .btn-danger { background: var(--danger); color: white; padding: 4px 8px; font-size: 11px; border-radius: 4px; }
        
        .calendar-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }
        .month-nav-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }
        .current-month-display {
            font-size: 22px;
            font-weight: bold;
            color: var(--primary);
            min-width: 160px;
            text-align: center;
        }

        .calendar-month {
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 15px;
        }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
        }
        .weekday-label {
            text-align: center;
            font-weight: bold;
            padding: 8px 0;
            background: #34495e;
            color: white;
            font-size: 13px;
        }
        .weekday-label:nth-child(7n), .weekday-label:nth-child(7n-6) {
            background: #e74c3c;
        }
        .day-cell {
            border: 1px solid #ddd;
            min-height: 180px; /* 調整高度以容納最多3個任務 */
            background: #fff;
            display: flex;
            flex-direction: column;
            border-radius: 4px;
        }
        .day-cell.empty {
            background: #f9f9f9;
            border: 1px dashed #eee;
        }
        .day-number {
            font-weight: bold;
            padding: 4px 6px;
            background: #f8f9fa;
            font-size: 12px;
            border-bottom: 1px solid #eee;
        }
        .time-slots-container {
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding: 4px;
            flex-grow: 1;
        }
        
        .slot-block {
            font-size: 11px;
            padding: 4px;
            background: #f1f2f6;
            border-radius: 3px;
            cursor: pointer;
            text-align: left;
            border-left: 3px solid #ccc;
            transition: all 0.2s;
        }
        .slot-block:hover {
            background: #dfe4ea;
        }

        /* 部分預約、未滿3個的樣式 */
        .slot-block.partially-booked {
            background: #e8f4f8;
            border-left-color: #2980b9;
            color: #2c3e50;
        }

        /* 🔒 滿額預約時段樣式 */
        .slot-block.booked-full {
            background: var(--booked-bg);
            border-left-color: var(--booked-border);
            color: var(--locked-text);
            font-weight: bold;
        }
        
        /* 🔒 一般人員模式下，滿額時禁止點選。管理員模式下會強制開啟點選 */
        .slot-block.booked-full.user-locked {
            cursor: not-allowed;
            pointer-events: none; 
        }

        .slot-block.disabled-slot {
            background: var(--disabled-bg);
            color: var(--disabled-text);
            border-left-color: #b0bec5;
            cursor: not-allowed;
            pointer-events: none; 
            font-weight: normal;
        }

        /* 管理員名單清單樣式 */
        .admin-list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px;
            background: #f8f9fa;
            border: 1px solid #e2e8f0;
            border-radius: 4px;
            margin-bottom: 6px;
            font-size: 12px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>📅 人力預約排班系統 (多工上限/管理修改版)</h2>
        
        <div class="auth-panel">
            <label for="admin_pwd" style="font-size:13px; font-weight:bold; color:#475569;">管理員認證：</label>
            <input type="password" id="admin_pwd" placeholder="請輸入帳號驗證" oninput="checkAuth()">
            
            <div id="admin-actions">
                <input type="file" id="excel_file" accept=".xlsx, .xls" style="display:none;" />
                <button class="btn btn-import" onclick="document.getElementById('excel_file').click()">匯入 Excel</button>
                <button class="btn btn-export" id="export_btn">導出 Excel</button>
            </div>
        </div>
    </div>

    <div class="calendar-controls">
        <button class="month-nav-btn" onclick="changeMonth(-1)">◀ 上個月</button>
        <div class="current-month-display" id="month-display">2026 年 07 月</div>
        <button class="month-nav-btn" onclick="changeMonth(1)">下個月 ▶</button>
    </div>

    <div class="calendar-month">
        <div class="calendar-grid" id="calendar-grid-box"></div>
    </div>
</div>

<div class="modal" id="booking-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000;">
    <div class="modal-content" style="background: white; padding: 25px; border-radius: 8px; width: 360px; margin: auto; position: relative; top: 20%;">
        <h3 id="modal-title" style="margin-top:0; color:var(--primary);">填寫預約排班</h3>
        <p id="modal-info" style="font-size:12px; color:#666; margin-bottom:15px;"></p>
        
        <div id="admin-manage-panel" style="display:none; margin-bottom: 15px; border-bottom: 2px dashed #cbd5e1; padding-bottom: 10px;">
            <label style="display: block; margin-bottom: 5px; font-weight: bold; color: var(--danger);">🛠️ 現有約定工作管理 (限管理員)</label>
            <div id="admin-job-list"></div>
        </div>

        <div id="booking-form-fields">
            <div style="margin-bottom: 15px;">
                <label style="display: block; margin-bottom: 5px; font-weight: bold;">人員姓名</label>
                <input type="text" id="input_staff" placeholder="請輸入姓名" style="width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px;">
            </div>
            <div style="margin-bottom: 15px;">
                <label style="display: block; margin-bottom: 5px; font-weight: bold;">服務站點</label>
                <input type="text" id="input_station" placeholder="請輸入站點" style="width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px;">
            </div>
        </div>

        <div style="display:flex; justify-content:flex-end; gap:10px; margin-top:20px;">
            <button class="btn btn-cancel" onclick="closeModal()" style="flex: 1;">放棄</button>
            <button class="btn btn-export" id="submit-booking-btn" onclick="saveBooking()" style="flex: 2;">確認輸入</button>
        </div>
    </div>
</div>

<script>
    const timeSlots = ["09:00-11:00", "11:00-13:00", "13:00-15:00", "15:00-17:00"];
    const weekdays = ["日", "一", "二", "三", "四", "五", "六"];
    
    // 🛠️ 核心結構改進：每個 Key 對應一個【陣列 []】，內部最多存 3 個物件
    let bookingDB = {}; 
    let activeKey = null;
    let currentViewDate = new Date();

    function checkAuth() {
        const inputVal = document.getElementById('admin_pwd').value.trim();
        const adminActions = document.getElementById('admin-actions');
        
        if (inputVal === "jonaslee") {
            adminActions.style.display = "flex"; 
        } else {
            adminActions.style.display = "none"; 
        }
        // 權限切換時，即時刷新月曆狀態（切換已滿額格子的點選權限）
        renderCurrentCalendar();
    }

    function changeMonth(direction) {
        currentViewDate.setMonth(currentViewDate.getMonth() + direction);
        renderCurrentCalendar();
    }

    function renderCurrentCalendar() {
        const year = currentViewDate.getFullYear();
        const month = currentViewDate.getMonth();
        const isAdmin = (document.getElementById('admin_pwd').value.trim() === "jonaslee");

        document.getElementById('month-display').innerText = `${year} 年 ${String(month + 1).padStart(2, '0')} 月`;
        const gridBox = document.getElementById('calendar-grid-box');
        gridBox.innerHTML = ''; 

        weekdays.forEach(w => {
            const label = document.createElement('div');
            label.className = 'weekday-label';
            label.innerText = w;
            gridBox.appendChild(label);
        });

        const firstDayIndex = new Date(year, month, 1).getDay();
        for (let i = 0; i < firstDayIndex; i++) {
            const emptyCell = document.createElement('div');
            emptyCell.className = 'day-cell empty';
            gridBox.appendChild(emptyCell);
        }

        const totalDays = new Date(year, month + 1, 0).getDate();
        const currentTimestamp = Date.now(); 

        for (let day = 1; day <= totalDays; day++) {
            const dayCell = document.createElement('div');
            dayCell.className = 'day-cell';

            const currentDayObj = new Date(year, month, day);
            const dayOfWeek = currentDayObj.getDay(); 
            const currentIsoDate = `${year}-${String(month + 1).padStart(2, '0')}--${String(day).padStart(2, '0')}`;
            // 改採標準格式儲存鍵值
            const dateKeyBase = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
            const endOfDayTimestamp = new Date(year, month, day, 23, 59, 59).getTime();

            const dateNum = document.createElement('div');
            dateNum.className = 'day-number';
            dateNum.innerText = day;
            dayCell.appendChild(dateNum);

            const slotsContainer = document.createElement('div');
            slotsContainer.className = 'time-slots-container';
            
            timeSlots.forEach(slot => {
                const slotBlock = document.createElement('div');
                const dbKey = `${dateKeyBase}_${slot}`;
                const jobs = bookingDB[dbKey] || []; // 取得目前已填寫的工作清單

                // A. 基礎防呆：週末與過期
                if (dayOfWeek === 6 || dayOfWeek === 0) {
                    slotBlock.className = 'slot-block disabled-slot';
                    slotBlock.innerText = `❌ 週末不開放`;
                } else if (endOfDayTimestamp < currentTimestamp) {
                    slotBlock.className = 'slot-block disabled-slot';
                    slotBlock.innerText = `⏳ 時段已過期`;
                } else {
                    // B. 正常排班期邏輯判斷 (上限 3 人)
                    if (jobs.length === 0) {
                        slotBlock.className = 'slot-block';
                        slotBlock.innerText = `${slot} (0/3)`;
                        slotBlock.addEventListener('click', () => openModal(dateKeyBase, slot));
                    } else if (jobs.length < 3) {
                        // 有人填寫但未滿 3 人
                        slotBlock.className = 'slot-block partially-booked';
                        let htmlContent = `<b>${slot} (${jobs.length}/3)</b>`;
                        jobs.forEach(j => htmlContent += `<br>• ${j.staff} [${j.station}]`);
                        slotBlock.innerHTML = htmlContent;
                        slotBlock.addEventListener('click', () => openModal(dateKeyBase, slot));
                    } else {
                        // ❌ 已額滿 (3人)
                        // 根據權限決定一般人不可點、管理員可以點
                        const adminLockClass = isAdmin ? '' : ' user-locked';
                        slotBlock.className = 'slot-block booked-full' + adminLockClass;
                        
                        let htmlContent = `<b>🔒 ${slot} [已滿額]</b>`;
                        jobs.forEach(j => htmlContent += `<br>• ${j.staff} [${j.station}]`);
                        slotBlock.innerHTML = htmlContent;
                        
                        // 管理員或一般人都可以綁定，但一般人會被 CSS pointer-events 阻擋點擊
                        slotBlock.addEventListener('click', () => openModal(dateKeyBase, slot));
                    }
                }
                slotsContainer.appendChild(slotBlock);
            });

            dayCell.appendChild(slotsContainer);
            gridBox.appendChild(dayCell);
        }
    }

    function openModal(date, slot) {
        activeKey = `${date}_${slot}`;
        const jobs = bookingDB[activeKey] || [];
        const isAdmin = (document.getElementById('admin_pwd').value.trim() === "jonaslee");

        document.getElementById('modal-info').innerText = `日期：${date} ｜ 時段：${slot}`;
        document.getElementById('input_staff').value = '';
        document.getElementById('input_station').value = '';
        
        const managePanel = document.getElementById('admin-manage-panel');
        const formFields = document.getElementById('booking-form-fields');
        const submitBtn = document.getElementById('submit-booking-btn');

        // 初始化狀態
        managePanel.style.display = "none";
        formFields.style.display = "block";
        submitBtn.style.display = "block";
        document.getElementById('modal-title').innerText = "填寫預約排班";

        // 1. 如果是管理員模式，開啟刪除與清單檢視面板
        if (isAdmin) {
            managePanel.style.display = "block";
            const jobListDiv = document.getElementById('admin-job-list');
            jobListDiv.innerHTML = '';
            
            if (jobs.length === 0) {
                jobListDiv.innerHTML = '<span style="color:#94a3b8; font-size:12px;">目前無任何約定工作</span>';
            } else {
                jobs.forEach((job, index) => {
                    const item = document.createElement('div');
                    item.className = 'admin-list-item';
                    item.innerHTML = `
                        <span>${index + 1}. <b>${job.staff}</b> - ${job.station}</span>
                        <button class="btn-danger" onclick="deleteJob(${index})">❌ 刪除</button>
                    `;
                    jobListDiv.appendChild(item);
                });
            }
        }

        // 2. 如果一般人員遇到滿額（理論上點不到，防呆用）或是已滿 3 筆，隱藏新增欄位
        if (jobs.length >= 3) {
            formFields.style.display = "none";
            submitBtn.style.display = "none";
            document.getElementById('modal-title').innerText = "預約已額滿";
        }

        document.getElementById('booking-modal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('booking-modal').style.display = 'none';
    }

    // 🛠️ 管理員專用：刪除特定任務筆數
    function deleteJob(index) {
        if (!confirm("確定要刪除此筆約定工作嗎？")) return;
        
        if (bookingDB[activeKey]) {
            bookingDB[activeKey].splice(index, 1); // 抽離該筆資料
            if (bookingDB[activeKey].length === 0) {
                delete bookingDB[activeKey]; // 若空了就移除 key
            }
            alert("資料已成功刪除！");
            closeModal();
            renderCurrentCalendar(); // 刷新大月曆
        }
    }

    function saveBooking() {
        const staff = document.getElementById('input_staff').value.trim();
        const station = document.getElementById('input_station').value.trim();

        if (!staff || !station) {
            alert('請填寫完整的人員姓名與站點！');
            return;
        }

        if (!bookingDB[activeKey]) {
            bookingDB[activeKey] = [];
        }

        // 再次檢查防呆上限 3 筆
        if (bookingDB[activeKey].length >= 3) {
            alert('該時段約定工作已達 3 筆上限，無法再新增！');
            return;
        }

        // 推進陣列
        bookingDB[activeKey].push({ staff, station });
        alert('約定工作填入成功！');
        closeModal();
        renderCurrentCalendar();
    }

    // 匯出 Excel (支援解開多筆資料展開導出)
    document.getElementById('export_btn').addEventListener('click', function() {
        if (document.getElementById('admin_pwd').value.trim() !== "jonaslee") {
            alert('無管理員權限，禁止導出檔案！');
            return;
        }

        const exportList = [];
        for (let key in bookingDB) {
            const [date, slot] = key.split('_');
            bookingDB[key].forEach(job => {
                exportList.push({
                    "預約日期": date,
                    "時間區隔": slot,
                    "人員姓名": job.staff,
                    "服務站點": job.station
                });
            });
        }
        if(exportList.length === 0) { alert('目前無任何排班資料可導出。'); return; }

        const wb = XLSX.utils.book_new();
        const ws = XLSX.utils.json_to_sheet(exportList);
        XLSX.utils.book_append_sheet(wb, ws, "排班資料");
        XLSX.writeFile(wb, `人力多工排班表_${new Date().toISOString().split('T')[0]}.xlsx`);
    });

    // 匯入 Excel (相容單筆與多筆重新歸類整合)
    document.getElementById('excel_file').addEventListener('change', function(e) {
        if (document.getElementById('admin_pwd').value.trim() !== "jonaslee") {
            alert('無管理員權限，禁止匯入檔案！');
            return;
        }

        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const worksheet = workbook.Sheets[workbook.SheetNames[0]];
            const json = XLSX.utils.sheet_to_json(worksheet);

            bookingDB = {}; 
            json.forEach(row => {
                const date = row["預約日期"];
                const slot = row["時間區隔"];
                if (date && slot) {
                    const dbKey = `${date}_${slot}`;
                    if (!bookingDB[dbKey]) {
                        bookingDB[dbKey] = [];
                    }
                    // 如果匯入檔案在同一時段有多行，自動集中整合在陣列中（若超過3筆依序保留）
                    bookingDB[dbKey].push({
                        staff: row["人員姓名"] || '',
                        station: row["服務站點"] || ''
                    });
                }
            });
            
            renderCurrentCalendar(); 
            alert('Excel 資料載入整合成功！');
        };
        reader.readAsArrayBuffer(file);
    });

    renderCurrentCalendar();
</script>

</body>
</html>
